name: MassPermits weekly data refresh

# Fully hosted refresh: fetch the scraper engine (kept OFF this public repo — it
# streams from private R2 via the OIDC-gated /api/get-engine), scrape fresh MA
# permits on a GitHub runner, build the customer bundles, and hand them back to
# R2 via /api/upload-bundle. Runs Mondays 09:00 UTC — three hours BEFORE the
# 12:00 UTC weekly-feed send, so subscribers always get same-morning data.
# No local machine involved; no secrets exist anywhere in this repo (OIDC only).
# Failures self-report to R2 refresh-status.json (Actions logs need admin auth).

# engine v16 (2026-07-20): 111 MA towns + per-town permit MAPS (town_visual.py)
# now drawn inside real municipal outlines (data/town_bounds.json — Census TIGER,
# public domain). Map framing favours where permits actually are, so a large
# empty appendage like Monomoy no longer squeezes the town into a corner. Teaser
# tables drop the "Project value" column entirely in towns that publish no
# valuations, instead of printing a column of $0.
# Plus: lead-intent titles, packed viewer HTML, PR-spike + $0-median fixes.
on:
  schedule:
    - cron: "0 9 * * 1"    # Mondays 09:00 UTC (~4-5am ET)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/weekly-refresh.yml"   # first push = immediate live test

permissions:
  id-token: write    # OIDC — keyless auth to /api/get-engine + /api/upload-bundle
  contents: write    # heartbeat commit (prevents GitHub's 60-day cron auto-disable)

concurrency:
  group: weekly-refresh
  cancel-in-progress: false   # never let two refreshes interleave R2 writes

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Fetch scraper engine (OIDC — engine is not in this repo)
        run: |
          ok=""
          for i in $(seq 1 10); do
            # mint per attempt — OIDC JWTs are short-lived (~5 min)
            OIDC=$(curl -fsS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=masspermits-cron" | jq -r .value)
            if curl -fsS -H "Authorization: Bearer $OIDC" \
              -o engine.tar.gz https://masspermits.com/api/get-engine; then ok=1; break; fi
            echo "engine fetch attempt $i failed (a Pages deploy may be racing); retrying in 30s"
            sleep 30
          done
          [ -n "$ok" ] || { echo "::error::engine fetch failed after 10 attempts"; exit 1; }
          tar xzf engine.tar.gz && rm engine.tar.gz && ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape, quality-gate, build bundles
        run: |
          set -o pipefail
          python -u hosted_refresh.py 2>&1 | tee run.log

      # Uploads happen here via curl, NOT inside Python: Cloudflare's WAF 403s
      # Python-urllib PUTs (bot fingerprint) but passes curl. WEEKLY ships first
      # (the 12:00 UTC send reads it). This step only runs when the gate passed.
      - name: Ship bundles to R2 (curl + OIDC)
        run: |
          up() {
            OIDC=$(curl -fsS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=masspermits-cron" | jq -r .value)
            curl -fsS -X PUT -H "Authorization: Bearer $OIDC" -H "Content-Type: $3" \
              --data-binary @"$1" "https://masspermits.com/api/upload-bundle?key=$2"
            echo "  shipped $2"
          }
          up "$(ls -t data/bundles/MassPermits-*-WEEKLY.zip  | head -1)" latest-weekly.zip  application/zip
          up "$(ls -t data/bundles/MassPermits-*-MONTHLY.zip | head -1)" latest-monthly.zip application/zip
          up "$(ls -t data/bundles/MassPermits-*-SAMPLE.zip  | head -1)" latest-sample.zip  application/zip

      # Status + full run log go to R2 even on failure — Actions logs need
      # repo-admin auth, R2 doesn't. This is the pipeline's black box, and
      # weekly-send checks status.json (ok + freshness) before mailing anyone.
      - name: Ship status + run log to R2 (always)
        if: always()
        run: |
          [ -f run.log ] || echo "(no run.log produced)" > run.log
          OIDC=$(curl -fsS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=masspermits-cron" | jq -r .value)
          curl -fsS -X PUT -H "Authorization: Bearer $OIDC" -H "Content-Type: text/plain" \
            --data-binary @run.log "https://masspermits.com/api/upload-bundle?key=run-log.txt" || true
          if [ -f status.json ]; then
            curl -fsS -X PUT -H "Authorization: Bearer $OIDC" -H "Content-Type: application/json" \
              --data-binary @status.json "https://masspermits.com/api/upload-bundle?key=refresh-status.json" || true
          fi

      # Keep the PUBLIC SITE fresh too: regenerate the masked teaser data.json
      # AND all ~200 programmatic SEO pages (fresh counts, sitemap, llms.txt)
      # from this week's scrape, commit to main -> Cloudflare Pages redeploys.
      # Weekly-changing content is a live-site signal to Google. (Does not
      # retrigger this workflow: its push trigger is paths-filtered to the yml.)
      - name: Refresh website teaser + SEO pages + report + video (commit to main)
        continue-on-error: true
        run: |
          git clone --depth 1 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" site
          python export_lander.py site/data.json
          python seo_build.py site
          # weekly PR report page (masspermits.com/report/) + pitch digest artifacts
          python pr_report.py || echo "::warning::pr_report failed — report page not refreshed"
          if [ -f out/pr/report.html ]; then mkdir -p site/report && cp out/pr/report.html site/report/index.html; fi
          # weekly narrated data video (embedded on site + posted to Bluesky below)
          python video_report.py || echo "::warning::video render failed — keeping last week's video"
          if [ -f data/video/weekly_report.mp4 ]; then mkdir -p site/video && cp data/video/weekly_report.mp4 site/video/weekly_report.mp4; fi
          cd site
          git config user.name "masspermits-refresh-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "data+seo+report: weekly site refresh (automated)" && git push origin main \
            || echo "site unchanged — nothing to push"

      # Weekly PR pitch digest -> owner's inbox (recipient hard-locked server-side).
      # He forwards the pitches he likes; nothing is ever auto-sent to outsiders.
      - name: Mail PR pitch digest to owner (OIDC)
        continue-on-error: true
        run: |
          [ -f out/pr/email_digest.html ] || { echo "no digest produced"; exit 0; }
          OIDC=$(curl -fsS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=masspermits-cron" | jq -r .value)
          curl -fsS -X POST -H "Authorization: Bearer $OIDC" -H "Content-Type: text/html" \
            --data-binary @out/pr/email_digest.html \
            "https://masspermits.com/api/mail-owner?subject=$(python -c 'import urllib.parse;print(urllib.parse.quote("Weekly PR pitches — forward the ones you like"))')"

      # Weekly data video -> Bluesky (skips cleanly if creds absent)
      - name: Post weekly video to Bluesky
        continue-on-error: true
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE || 'masspermits.bsky.social' }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: |
          pip install "atproto>=0.0.55" >/dev/null 2>&1 || true
          python bsky_video_post.py || echo "::warning::bsky video post failed"

      # GitHub auto-disables scheduled workflows on public repos after 60 days
      # without repo activity. This commit after each successful run counts as
      # activity, so the cron can never silently die. Pushed to a dedicated
      # 'heartbeat' branch: no Pages rebuild, no workflow triggers.
      - name: Keep-alive heartbeat commit
        continue-on-error: true
        run: |
          git clone --depth 1 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" hb
          cd hb
          git config user.name "masspermits-refresh-bot"
          git config user.email "actions@github.com"
          date -u +"last successful refresh: %Y-%m-%dT%H:%M:%SZ" > .heartbeat
          git add .heartbeat
          git commit -m "heartbeat: weekly refresh succeeded"
          git push -f origin HEAD:refs/heads/heartbeat
